substitutions:
  _REGION: southamerica-east1
  _SERVICE: istock-web
  _REPOSITORY: istock-web
  _BUCKET: istock-web-data
  _DOMAIN: www.istockbl.com.br

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --add-volume=name=data,type=cloud-storage,bucket=${_BUCKET}
      - --add-volume-mount=volume=data,mount-path=/data
      - --set-secrets=JWT_SECRET=istock-jwt-secret:latest
      - --set-env-vars=NODE_ENV=production,APP_URL=https://${_DOMAIN},CORS_ORIGIN=https://${_DOMAIN},https://istockbl.com.br,DATABASE_PATH=/data/istock.db,UPLOAD_DIR=/data/uploads

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
